name: rust-release-zsh

on:
  workflow_call:

env:
  ZSH_COMMIT: 77045ef899e53b9598bebc5a41db93a548a40ca6
  ZSH_PATCH: codex-rs/shell-escalation/patches/zsh-exec-wrapper.patch

jobs:
  linux:
    name: Build zsh (Linux) - ${{ matrix.variant }} - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    container:
      image: ${{ matrix.image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            variant: ubuntu-24.04
            image: ubuntu:24.04
            archive_name: codex-zsh-x86_64-unknown-linux-musl.tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            variant: ubuntu-24.04
            image: arm64v8/ubuntu:24.04
            archive_name: codex-zsh-aarch64-unknown-linux-musl.tar.gz

    steps:
      - name: Install build prerequisites
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            autoconf \
            bison \
            build-essential \
            ca-certificates \
            gettext \
            git \
            libncursesw5-dev

      - uses: actions/checkout@v6

      - name: Build patched zsh
        shell: bash
        run: |
          set -euo pipefail
          git clone https://git.code.sf.net/p/zsh/code /tmp/zsh
          cd /tmp/zsh
          git checkout "${ZSH_COMMIT}"
          git apply "${GITHUB_WORKSPACE}/${ZSH_PATCH}"
          ./Util/preconfig
          ./configure
          cores="$(command -v nproc >/dev/null 2>&1 && nproc || getconf _NPROCESSORS_ONLN)"
          make -j"${cores}"

      - name: Smoke test zsh exec wrapper
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cat > "$tmpdir/exec-wrapper" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          : "${CODEX_WRAPPER_LOG:?missing CODEX_WRAPPER_LOG}"
          printf '%s\n' "$@" > "$CODEX_WRAPPER_LOG"
          file="$1"
          shift
          if [[ "$#" -eq 0 ]]; then
            exec "$file"
          fi
          arg0="$1"
          shift
          exec -a "$arg0" "$file" "$@"
          EOF
          chmod +x "$tmpdir/exec-wrapper"

          CODEX_WRAPPER_LOG="$tmpdir/wrapper.log" \
          EXEC_WRAPPER="$tmpdir/exec-wrapper" \
          /tmp/zsh/Src/zsh -fc '/bin/echo smoke-zsh' > "$tmpdir/stdout.txt"

          grep -Fx "smoke-zsh" "$tmpdir/stdout.txt"
          grep -Fx "/bin/echo" "$tmpdir/wrapper.log"

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/zsh/${{ matrix.target }}"
          mkdir -p "$dest"
          temp_root="${RUNNER_TEMP:-/tmp}"
          package_root="${temp_root}/codex-zsh"
          rm -rf "$package_root"
          mkdir -p "$package_root/bin"
          cp /tmp/zsh/Src/zsh "$package_root/bin/zsh"
          chmod +x "$package_root/bin/zsh"

          archive_path="$dest/${{ matrix.archive_name }}"
          (cd "$temp_root" && tar -czf "$GITHUB_WORKSPACE/$archive_path" codex-zsh)

      - uses: actions/upload-artifact@v7
        with:
          name: codex-zsh-${{ matrix.target }}
          path: dist/zsh/${{ matrix.target }}/*

  darwin:
    name: Build zsh (macOS) - ${{ matrix.variant }} - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-xlarge
            target: aarch64-apple-darwin
            variant: macos-15
            archive_name: codex-zsh-aarch64-apple-darwin.tar.gz

    steps:
      - name: Install build prerequisites
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v autoconf >/dev/null 2>&1; then
            brew install autoconf
          fi

      - uses: actions/checkout@v6

      - name: Build patched zsh
        shell: bash
        run: |
          set -euo pipefail
          git clone https://git.code.sf.net/p/zsh/code /tmp/zsh
          cd /tmp/zsh
          git checkout "${ZSH_COMMIT}"
          git apply "${GITHUB_WORKSPACE}/${ZSH_PATCH}"
          ./Util/preconfig
          ./configure
          cores="$(getconf _NPROCESSORS_ONLN)"
          make -j"${cores}"

      - name: Smoke test zsh exec wrapper
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cat > "$tmpdir/exec-wrapper" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          : "${CODEX_WRAPPER_LOG:?missing CODEX_WRAPPER_LOG}"
          printf '%s\n' "$@" > "$CODEX_WRAPPER_LOG"
          file="$1"
          shift
          if [[ "$#" -eq 0 ]]; then
            exec "$file"
          fi
          arg0="$1"
          shift
          exec -a "$arg0" "$file" "$@"
          EOF
          chmod +x "$tmpdir/exec-wrapper"

          CODEX_WRAPPER_LOG="$tmpdir/wrapper.log" \
          EXEC_WRAPPER="$tmpdir/exec-wrapper" \
          /tmp/zsh/Src/zsh -fc '/bin/echo smoke-zsh' > "$tmpdir/stdout.txt"

          grep -Fx "smoke-zsh" "$tmpdir/stdout.txt"
          grep -Fx "/bin/echo" "$tmpdir/wrapper.log"

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/zsh/${{ matrix.target }}"
          mkdir -p "$dest"
          temp_root="${RUNNER_TEMP:-/tmp}"
          package_root="${temp_root}/codex-zsh"
          rm -rf "$package_root"
          mkdir -p "$package_root/bin"
          cp /tmp/zsh/Src/zsh "$package_root/bin/zsh"
          chmod +x "$package_root/bin/zsh"

          archive_path="$dest/${{ matrix.archive_name }}"
          (cd "$temp_root" && tar -czf "$GITHUB_WORKSPACE/$archive_path" codex-zsh)

      - uses: actions/upload-artifact@v7
        with:
          name: codex-zsh-${{ matrix.target }}
          path: dist/zsh/${{ matrix.target }}/*
